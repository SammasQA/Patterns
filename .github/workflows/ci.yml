name: Run tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up JDK 11
        uses: actions/setup-java@v3
        with:
          java-version: '11'
          distribution: 'temurin'


      - name: Start SUT on port 9999
        run: java -jar ./artifacts/app-card-delivery.jar --server.port=9999 &


      - name: Wait for SUT to be ready
        run: |
          timeout 60 bash -c 'until curl -s http://localhost:9999; do sleep 2; done'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew


      - name: Build with Gradle
        run: ./gradlew test --info -Dselenide.headless=true
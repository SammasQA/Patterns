name: Java CI with Gradle

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v2

      - name: Set up JDK 11
        uses: actions/setup-java@v2
        with:
          java-version: '11'
          distribution: 'adopt'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew


      - name: Start SUT on port 9999
        run: java -jar ./artifacts/app-mbank.jar --server.port=9999 &


      - name: Wait for SUT to be ready
        run: |
          timeout 60 bash -c 'until curl -s http://localhost:9999; do sleep 2; done'


      - name: Build with Gradle
        run: ./gradlew test --info -Dselenide.headless=true -Dselenide.chromeoptions.args="--no-sandbox"